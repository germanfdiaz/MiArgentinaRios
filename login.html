<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Argentina - Login</title>
    <style>
        :root {
            --brand-purple: #3233B8;
            --text-gray: #333;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff;
        }

        /* Contenedor de la imagen central */
        .top-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 60px 40px 60px;
        }

        .login-main-image {
            width: 90%;
            max-width: 320px;
            height: auto;
            /* Ajuste para que la imagen se vea nítida */
            object-fit: contain;
        }

        /* Sección de Botón Principal */
        .action-section {
            padding: 0 30px 40px 30px;
        }

        .btn-login {
            width: 100%;
            background-color: var(--brand-purple);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* Sección Inferior (Crear cuenta) */
        .footer-section {
            border-top: 1px solid #eee;
            padding: 30px;
            text-align: center;
        }

        .footer-section p {
            color: var(--text-gray);
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .btn-create {
            width: 100%;
            background-color: white;
            color: var(--brand-purple);
            border: 2px solid var(--brand-purple);
            padding: 14px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-section">
        <img src="login.png" alt="Mi Argentina Login" class="login-main-image">
    </div>

    <div class="action-section">
        <button class="btn-login" onclick="window.location.href='home.html'">
            Ingresar con mi cuenta
        </button>
    </div>

    <div class="footer-section">
        <p>¿No tenés cuenta en Mi Argentina?</p>
        <button class="btn-create">
            Crear una cuenta
        </button>
    </div>

</body>
</html>
